<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Config — Glorieta</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #15110f; color: #eee; padding: 24px; }
  h1 { font-size: 1.4rem; }
  label { font-size: .85rem; color: #bbb; }
  .form-control { background: #221c19; color: #eee; border-color: #444; }
  .form-control:focus { background: #221c19; color: #eee; border-color: #efb34a; box-shadow: 0 0 0 .2rem rgba(239,179,74,.25); }
  .btn-primary { background: #efb34a; border-color: #efb34a; color: #221c19; font-weight: 600; }
  .btn-primary:hover { background: #e0a435; border-color: #e0a435; color: #221c19; }
  #loginForm { max-width: 320px; margin: 80px auto; }
  .msg { margin: 10px 0; font-size: .85rem; }
  .msg.err { color: #e25b4d; }
  .back-home { display: block; max-width: 320px; margin: 0 auto; }
</style>
</head>
<body>

<a href="/" class="back-home btn btn-outline-secondary btn-sm">← Inicio</a>

<form id="loginForm" class="d-flex flex-column gap-3">
  <h1>Config — Glorieta</h1>
  <div>
    <label class="form-label">Usuario</label>
    <input type="text" class="form-control" id="username" autocomplete="username" required>
  </div>
  <div>
    <label class="form-label">Contraseña</label>
    <input type="password" class="form-control" id="password" autocomplete="current-password" required>
  </div>
  <button type="submit" class="btn btn-primary">Entrar</button>
  <div class="msg err" id="loginMsg"></div>
</form>

<script>
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password }),
  });
  if (res.ok) {
    location.href = '/config-dashboard';
  } else {
    const msg = document.getElementById('loginMsg');
    msg.textContent = 'Usuario o contraseña incorrectos.';
  }
};

(async function init() {
  const res = await fetch('/api/session');
  const data = await res.json();
  if (data.authenticated) location.href = '/config-dashboard';
})();
</script>
</body>
</html>
