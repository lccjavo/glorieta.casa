<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Config — Glorieta</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #15110f; color: #eee; padding: 24px; }
  h1 { font-size: 1.4rem; }
  h2 { font-size: 1.1rem; margin: 32px 0 12px; }
  .panel { max-width: 900px; margin: 0 auto; }
  label { font-size: .85rem; color: #bbb; }
  .form-control, .form-select { background: #221c19; color: #eee; border-color: #444; }
  .form-control:focus, .form-select:focus { background: #221c19; color: #eee; border-color: #efb34a; box-shadow: 0 0 0 .2rem rgba(239,179,74,.25); }
  .form-check-input { background-color: #221c19; border-color: #555; }
  .btn-primary { background: #efb34a; border-color: #efb34a; color: #221c19; font-weight: 600; }
  .btn-primary:hover { background: #e0a435; border-color: #e0a435; color: #221c19; }
  .beer-card { background: #1d1714; border: 1px solid #332b26; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .msg { margin: 10px 0; font-size: .85rem; }
  .msg.ok { color: #6fbf73; }
  .msg.err { color: #e25b4d; }
  .upload-card .preview-wrap { position: relative; margin-top: 8px; }
  .upload-card img { max-width: 100%; display: block; border-radius: 6px; border: 1px solid #333; }
  .upload-card .preview-wrap.uploading img { opacity: .3; }
  .spinner { display: none; position: absolute; top: 50%; left: 50%; width: 36px; height: 36px; margin: -18px 0 0 -18px; border: 4px solid #444; border-top-color: #efb34a; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .preview-wrap.uploading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="panel" id="app">
  <div class="d-flex justify-content-between align-items-center">
    <h1>Tap list y menú</h1>
    <div class="d-flex gap-2">
      <a href="/" class="btn btn-outline-secondary">← Inicio</a>
      <button class="btn btn-secondary" id="logoutBtn">Salir</button>
    </div>
  </div>

  <h2>Tap list</h2>
  <div id="taplistBody"></div>
  <div class="d-flex gap-2 my-3">
    <button type="button" class="btn btn-secondary" id="addRowBtn">+ Agregar cerveza</button>
    <button type="button" class="btn btn-primary" id="saveTaplistBtn">Guardar tap list</button>
  </div>
  <div class="msg" id="taplistMsg"></div>

  <h2>Menú (imágenes)</h2>
  <div class="row g-4">
    <div class="col-12 col-md-6 upload-card">
      <label class="form-label">Menú en español (PNG)</label>
      <input type="file" class="form-control" id="menuEsFile" accept="image/png">
      <div class="preview-wrap" id="menuEsWrap">
        <img id="menuEsPreview" src="/menu.png" alt="Menú ES">
        <div class="spinner"></div>
      </div>
    </div>
    <div class="col-12 col-md-6 upload-card">
      <label class="form-label">Menú en inglés (PNG)</label>
      <input type="file" class="form-control" id="menuEnFile" accept="image/png">
      <div class="preview-wrap" id="menuEnWrap">
        <img id="menuEnPreview" src="/menu_en.png" alt="Menú EN">
        <div class="spinner"></div>
      </div>
    </div>
  </div>
  <div class="msg" id="menuMsg"></div>
</div>

<script>
const COLORS = ['pale', 'ipa', 'hazy', 'lager', 'red', 'vienna', 'stout', 'session'];

function setMsg(el, text, ok) {
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
}

function rowFromItem(item) {
  const card = document.createElement('div');
  card.className = 'beer-card';
  card.innerHTML = `
    <div class="d-flex align-items-center gap-2 mb-2">
      <span class="badge text-bg-dark border border-secondary position-label">#</span>
      <small class="text-muted">posición en el tap list</small>
    </div>
    <div class="row g-2">
      <div class="col-12 col-md-6">
        <label class="form-label">Nombre</label>
        <input class="form-control f-name" value="${escapeAttr(item.name)}">
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">Estilo</label>
        <input class="form-control f-style" value="${escapeAttr(item.style)}">
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">Cervecería</label>
        <input class="form-control f-brewery" value="${escapeAttr(item.brewery)}">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">%ABV</label>
        <input class="form-control f-abv" value="${escapeAttr(item.abv)}">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">Color</label>
        <select class="form-select f-color">${COLORS.map(c => `<option value="${c}" ${c === item.color ? 'selected' : ''}>${c}</option>`).join('')}</select>
      </div>
      <div class="col-6 col-md-1">
        <label class="form-label">Lúpulo</label>
        <input class="form-control f-hops" type="number" min="0" max="5" value="${item.hops}">
      </div>
      <div class="col-6 col-md-1">
        <label class="form-label">Precio</label>
        <input class="form-control f-price" type="number" min="0" value="${item.price}">
      </div>
      <div class="col-12 d-flex flex-wrap align-items-center justify-content-between gap-2 mt-1">
        <div class="form-check">
          <input class="form-check-input f-soldout" type="checkbox" ${item.soldOut ? 'checked' : ''}>
          <label class="form-check-label">Agotada</label>
        </div>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-sm btn-secondary up">↑</button>
          <button type="button" class="btn btn-sm btn-secondary down">↓</button>
          <button type="button" class="btn btn-sm btn-outline-danger del">✕ Eliminar</button>
        </div>
      </div>
    </div>
  `;
  card.querySelector('.up').onclick = () => { moveRow(card, -1); renumberCards(); };
  card.querySelector('.down').onclick = () => { moveRow(card, 1); renumberCards(); };
  card.querySelector('.del').onclick = () => { card.remove(); renumberCards(); };
  return card;
}

function escapeAttr(str) {
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function moveRow(card, dir) {
  const sibling = dir < 0 ? card.previousElementSibling : card.nextElementSibling;
  if (!sibling) return;
  if (dir < 0) sibling.before(card);
  else sibling.after(card);
}

function renumberCards() {
  document.querySelectorAll('#taplistBody .beer-card').forEach((card, i) => {
    card.querySelector('.position-label').textContent = '#' + (i + 1);
  });
}

function readRows() {
  return [...document.querySelectorAll('#taplistBody .beer-card')].map(card => ({
    name: card.querySelector('.f-name').value.trim(),
    style: card.querySelector('.f-style').value.trim(),
    brewery: card.querySelector('.f-brewery').value.trim(),
    abv: card.querySelector('.f-abv').value.trim(),
    color: card.querySelector('.f-color').value,
    hops: parseInt(card.querySelector('.f-hops').value, 10) || 0,
    price: parseFloat(card.querySelector('.f-price').value) || 0,
    soldOut: card.querySelector('.f-soldout').checked,
  }));
}

async function loadTaplist() {
  const res = await fetch('/api/taplist', { cache: 'no-store' });
  const items = await res.json();
  const body = document.getElementById('taplistBody');
  body.innerHTML = '';
  items.forEach(item => body.appendChild(rowFromItem(item)));
  renumberCards();
}

document.getElementById('addRowBtn').onclick = () => {
  document.getElementById('taplistBody').appendChild(rowFromItem({
    name: '', style: '', brewery: '', abv: '', color: 'pale', hops: 1, price: 100, soldOut: false,
  }));
  renumberCards();
};

document.getElementById('saveTaplistBtn').onclick = async () => {
  const msg = document.getElementById('taplistMsg');
  const items = readRows();
  if (items.some(i => !i.name)) {
    setMsg(msg, 'Cada cerveza necesita un nombre.', false);
    return;
  }
  const res = await fetch('/api/taplist', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(items),
  });
  if (res.ok) setMsg(msg, 'Guardado.', true);
  else {
    const data = await res.json().catch(() => ({}));
    setMsg(msg, data.error || 'Error al guardar.', false);
  }
};

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadMenu(lang, file, previewEl, fileInput, wrapEl) {
  const msg = document.getElementById('menuMsg');
  fileInput.disabled = true;
  wrapEl.classList.add('uploading');
  setMsg(msg, `Subiendo menú (${lang})...`, true);
  try {
    const imageBase64 = await fileToBase64(file);
    const res = await fetch('/api/menu-upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lang, imageBase64 }),
    });
    if (res.ok) {
      setMsg(msg, `Menú (${lang}) actualizado.`, true);
      previewEl.src = previewEl.src.split('?')[0] + '?v=' + Date.now();
    } else {
      const data = await res.json().catch(() => ({}));
      setMsg(msg, data.error || 'Error al subir imagen.', false);
    }
  } catch (err) {
    setMsg(msg, 'Error al subir imagen.', false);
  } finally {
    fileInput.disabled = false;
    fileInput.value = '';
    wrapEl.classList.remove('uploading');
  }
}

document.getElementById('menuEsFile').onchange = (e) => {
  if (e.target.files[0]) {
    uploadMenu('es', e.target.files[0], document.getElementById('menuEsPreview'), e.target, document.getElementById('menuEsWrap'));
  }
};
document.getElementById('menuEnFile').onchange = (e) => {
  if (e.target.files[0]) {
    uploadMenu('en', e.target.files[0], document.getElementById('menuEnPreview'), e.target, document.getElementById('menuEnWrap'));
  }
};

document.getElementById('logoutBtn').onclick = async () => {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/config';
};

(async function init() {
  const res = await fetch('/api/session');
  const data = await res.json();
  if (!data.authenticated) {
    location.href = '/config';
    return;
  }
  loadTaplist();
})();
</script>
</body>
</html>
