<body class="music-page">
  <main class="music-screen">
    <section id="videoPanel" class="music-panel video-panel" aria-label="Playlist musical">
      <div id="ytPlayer" style="width:100vw;height:100vh;"></div>
    </section>

    <section id="menuPanel" class="music-panel menu-panel" aria-label="Tap list">
      <iframe id="taplistFrame" src="index.html#taplist" title="Tap list" style="width:100%;flex:1;min-height:0;border:0;display:block;"></iframe>
      <div class="taplist-spacer"></div>
    </section>


    <div id="musicStatus" class="music-status">Video</div>

    <div id="musicNav" class="music-nav">
      <button id="btnVideo" class="music-nav-btn" type="button">▶ Video</button>
      <button id="btnTaplist" class="music-nav-btn" type="button">🍺 Tap list</button>
    </div>

    <div id="musicStart" class="music-start">
      <div class="music-start-box">
        <div class="eyebrow">Casa de la Glorieta</div>
        <h1>Modo música</h1>
        <p>Abre el playlist y alterna automáticamente entre video y tap list cada 30 segundos.</p>
        <button id="startBtn" class="btn" type="button">▶ Iniciar pantalla</button>
        <div class="music-note">Esta versión usa el embed oficial de playlist completa. Si YouTube muestra “video no disponible”, es restricción del video/playlist para iframe y no de la página.</div>
      </div>
    </div>
  </main>

  <script>
    // YouTube IFrame API — shuffle + random start
    (function () {
      var tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    })();

    var ytPlayer;
    var ytReady = false;

    window.onYouTubeIframeAPIReady = function () {
      ytPlayer = new YT.Player('ytPlayer', {
        width: '100%',
        height: '100%',
        playerVars: {
          listType: 'playlist',
          list: 'PLw-VjHDlEOgtkcsMrt_l4MVtcHpuUOgVM',
          autoplay: 0,
          controls: 1,
          rel: 0,
          modestbranding: 1,
          playsinline: 1
        },
        events: {
          onReady: function (e) {
            ytReady = true;
            e.target.setShuffle(true);
          }
        }
      });
    };

    const VIDEO_MS   = 30000;
    const TAPLIST_MS = 30000;
    let showingVideo = false;
    let switchTimer  = null;

    const videoPanel   = document.getElementById("videoPanel");
    const menuPanel    = document.getElementById("menuPanel");
    const taplistFrame = document.getElementById("taplistFrame");
    const statusEl     = document.getElementById("musicStatus");
    const startOverlay = document.getElementById("musicStart");
    const musicNav     = document.getElementById("musicNav");
    const btnVideo     = document.getElementById("btnVideo");
    const btnTaplist   = document.getElementById("btnTaplist");

    // Inject TV-display styles into the taplist iframe.
    // CSS from music.html cannot cross the iframe boundary, so we inject
    // a <style> tag after load. Scoped entirely to the /music embed.
    taplistFrame.addEventListener('load', function () {
      try {
        var doc = taplistFrame.contentDocument;
        if (!doc || !doc.head) return;
        var old = doc.getElementById('music-tv-styles');
        if (old) old.remove();
        var style = doc.createElement('style');
        style.id = 'music-tv-styles';
        style.textContent = [
          /* Always: hide the homepage nav bar */
          '.nav { display:none !important; }',

          /* Section fills 97vh with dark bg — hides the food image    */
          /* that bleeds in from the next section. Flex-centers content */
          /* vertically for a clean kiosk look on the TV.              */
          '#taplist {',
          '  min-height:97vh !important;',
          '  padding-top:24px !important;',
          '  padding-bottom:24px !important;',
          '  padding-left:0 !important;',
          '  padding-right:0 !important;',
          '  display:flex !important;',
          '  flex-direction:column !important;',
          '  justify-content:center !important;',
          '}',

          '.tap-head { margin-bottom:14px !important; }',

          /* ── Large screen ≥ 1200px ── */
          '@media (min-width:1200px) {',
          '  .tap-wrap { max-width:92vw !important; }',
          '  .tap-grid { max-width:100% !important; gap:18px !important; }',
          '  .tap-item { padding:20px 22px !important; }',
          '  .tap-item-new .tap-info h3 { font-size:24px !important; line-height:1.2 !important; }',
          '  .tap-item-new .tap-info p  { font-size:15px !important; }',
          '  .tap-price                 { font-size:20px !important; }',
          '  .hops span                 { width:10px !important; height:10px !important; }',
          '  .beer-dot                  { width:14px !important; height:14px !important; }',
          '}',

          /* ── Full 1080p TV ≥ 1600px — readable from 2m at the bar ── */
          '@media (min-width:1600px) {',
          '  .tap-wrap { max-width:86vw !important; }',
          '  .tap-grid { gap:22px !important; }',
          '  .tap-item { padding:26px 30px !important; }',
          '  .tap-item-new .tap-info h3 { font-size:32px !important; }',
          '  .tap-item-new .tap-info p  { font-size:18px !important; }',
          '  .tap-price                 { font-size:26px !important; }',
          '  .tap-head h2               { font-size:56px !important; margin-bottom:8px !important; }',
          '  .tap-head p                { font-size:18px !important; }',
          '  .hops span                 { width:12px !important; height:12px !important; }',
          '  .beer-dot                  { width:16px !important; height:16px !important; }',
          '}'
        ].join('\n');
        doc.head.appendChild(style);
      } catch (e) {}
    });

    function setPanel(showVideo) {
      showingVideo = showVideo;
      videoPanel.classList.toggle("active", showVideo);
      menuPanel.classList.toggle("active", !showVideo);
      statusEl.textContent = showVideo ? "Video" : "Tap list";
      btnVideo.classList.toggle("active", showVideo);
      btnTaplist.classList.toggle("active", !showVideo);

      if (!showVideo) {
        taplistFrame.src = 'index.html?v=' + Date.now() + '#taplist';
      }

      if (switchTimer) clearTimeout(switchTimer);
      switchTimer = setTimeout(() => setPanel(!showingVideo), showVideo ? VIDEO_MS : TAPLIST_MS);
    }

    document.getElementById("startBtn").addEventListener("click", () => {
      startOverlay.classList.add("hidden");
      musicNav.style.display = "flex";
      if (ytReady) {
        ytPlayer.playVideoAt(Math.floor(Math.random() * 30));
      }
      setPanel(true);
    });

    btnVideo.addEventListener("click", () => setPanel(true));
    btnTaplist.addEventListener("click", () => setPanel(false));

    document.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        if (switchTimer) clearTimeout(switchTimer);
        setPanel(!showingVideo);
      }
    });
  </script>
</body>
</html>
